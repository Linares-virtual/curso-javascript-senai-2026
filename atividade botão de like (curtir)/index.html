<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Opiniões - Aula 08</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="caixa">
        <h1>Avaliação</h1>
        <p id="status">Deixe sua opinião abaixo:</p>
        <hr>

        <div class="sessao-voto">
            <button id="btnLike" class="btn"> ✅ Curtir ❤️ </button>
            <p>👍 Total de Likes: <span id="contLike" class="contador">0</span></p>
        </div>

        <div class="sessao-voto">
            <button id="btnDislike" class="btn"> ❌ Não Curti </button>
            <p>👎 Total de Negativos: <span id="contDislike" class="contador">0</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
