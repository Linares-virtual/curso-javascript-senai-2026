<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login Intermediário</title>
</head>

<body>

    <div style="text-align: center; margin: auto; width: 280px; padding: 20px;  border: 2px soli #000000; 
    border-radius: 15px; border: 2px solid black; padding: 20px; width: fit-content;">
        <h2>Área de Login</h2>
        <div>
            <input type="text" id="userInput" placeholder="Usuário">
        </div>
        <br>
        <div>
            <input type="password" id="passInput" placeholder="Senha">
        </div>
        <br>
        <button id="btnLogin">Entrar</button>
        <p id="mensagem"></p>
    </div>


    <script src="script.js"></script>
</body>

</html>
